  <title>Umbwela™ — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #ffffff;
      padding: 2rem;
      text-align: center;
    }

    .logo-mark {
      margin-bottom: 2rem;
    }

    .logo-mark svg {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 30px rgba(255, 140, 0, 0.15));
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    h1 .tm {
      font-size: 1rem;
      vertical-align: super;
      font-weight: 400;
      opacity: 0.5;
    }

    .tagline {
      font-size: 1.25rem;
      font-weight: 300;
      color: #9ca3af;
      margin-bottom: 3rem;
      max-width: 500px;
      line-height: 1.6;
    }

    .cta-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cta-row a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .cta-primary {
      background: #FF8C00;
      color: #0f1117;
    }
    .cta-primary:hover {
      background: #e07d00;
      transform: translateY(-1px);
    }

    .cta-secondary {
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .cta-secondary:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .social-links {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
    }

    .social-links a {
      color: #6b7280;
      transition: color 0.2s ease;
    }
    .social-links a:hover {
      color: #FF8C00;
    }

    .social-links svg {
      width: 22px;
      height: 22px;
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8rem;
      color: #4b5563;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .tagline { font-size: 1rem; }
    }
  </style>
</head>
